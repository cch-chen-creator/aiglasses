<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 智慧眼鏡驗配歷史紀錄回溯系統</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        
        .container { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 540px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
        }
        
        h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 8px; 
            text-align: center; 
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 36px;
        }
        
        .form-group { 
            margin-bottom: 28px; 
        }
        
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 10px; 
            font-size: 15px; 
            color: var(--text-main);
        }
        
        .required::after { 
            content: " *"; 
            color: #ef4444; 
        }
        
        select, input[type="tel"], textarea { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            font-size: 16px; 
            box-sizing: border-box; 
            background-color: #fff;
            transition: all 0.2s ease;
            color: var(--text-main);
        }
        
        select:focus, input:focus, textarea:focus { 
            border-color: var(--primary-color); 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none; 
        }
        
        /* 處方單選鈕美化為精緻卡片 */
        .radio-group { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        
        .radio-label { 
            display: flex; 
            align-items: center; 
            padding: 14px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 500; 
            transition: all 0.2s ease;
            background-color: #fff;
        }
        
        .radio-label input { 
            margin-right: 14px; 
            transform: scale(1.2); 
            accent-color: var(--primary-color);
        }
        
        .radio-label:hover {
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }

        /* 點選後的強烈視覺反饋 */
        .radio-label:has(input:checked) { 
            border-color: var(--primary-color); 
            background-color: #eff6ff; 
            color: var(--primary-color);
            font-weight: 600; 
            box-shadow: 0 0 0 1px var(--primary-color);
        }
        
        .btn-submit { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 12px; 
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }
        
        .btn-submit:hover { 
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .btn-submit:disabled { 
            background: #cbd5e1; 
            color: #94a3b8;
            cursor: not-allowed; 
            transform: none;
            box-shadow: none;
        }
        
        .note { 
            font-size: 13px; 
            color: var(--text-muted); 
            margin-top: 6px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>智慧眼鏡驗配紀錄回溯</h2>
    <div class="subtitle">年度歷史成交數據盤點端</div>
    
    <form id="surveyForm">
        <div class="form-group">
            <label class="required">填報門市</label>
            <select name="store" required>
                <option value="">請選擇門市...</option>
                <option value="0002_北市站前">0002_北市站前</option>
                <option value="0008_北市新南">0008_北市新南</option>
                <option value="0009_北市忠孝">0009_北市忠孝</option>
                <option value="0011_新莊新泰">0011_新莊新泰</option>
                <option value="0012_三峽復興">0012_三峽復興</option>
                <option value="0013_三重重新">0013_三重重新</option>
                <option value="0014_桃園中正">0014_桃園中正</option>
                <option value="0016_台南民生">0016_台南民生</option>
                <option value="0017_板橋忠孝">0017_板橋忠孝</option>
                <option value="0018_高雄鳳山">0018_高雄鳳山</option>
                <option value="0019_永和永和">0019_永和永和</option>
                <option value="0020_新竹文化">0020_新竹文化</option>
                <option value="0021_桃園中壢">0021_桃園中壢</option>
                <option value="0032_台中大墩">0032_台中大墩</option>
                <option value="0047_北市內湖">0047_北市內湖</option>
                <option value="0054_北市常德">0054_北市常德</option>
                <option value="0083_花蓮中山">0083_花蓮中山</option>
                <option value="0087_三重信林">0087_三重信林</option>
                <option value="0088_南崁中正">0088_南崁中正</option>
                <option value="0089_桃園龍潭">0089_桃園龍潭</option>
                <option value="0090_板橋文化">0090_板橋文化</option>
                <option value="0091_北市士林">0091_北市士林</option>
                <option value="0092_中和南勢角">0092_中和南勢角</option>
                <option value="0094_台中豐原">0094_台中豐原</option>
                <option value="0095_台中東勢">0095_台中東勢</option>
                <option value="0097_屏東潮州">0097_屏東潮州</option>
                <option value="0098_嘉義垂楊">0098_嘉義垂楊</option>
                <option value="0099_高雄左營">0099_高雄左營</option>
                <option value="0118_澎湖澎一">0118_澎湖澎一</option>
                <option value="0201_台南長榮">0201_台南長榮</option>
                <option value="0202_台中西屯">0202_台中西屯</option>
                <option value="0203_台中崇德">0203_台中崇德</option>
                <option value="0204_桃園藝文">0204_桃園藝文</option>
                <option value="0205_新竹竹北">0205_新竹竹北</option>
                <option value="0206_雲林斗六">0206_雲林斗六</option>
                <option value="0207_基隆義一">0207_基隆義一</option>
            </select>
        </div>

        <div class="form-group">
            <label class="required">三聯單號</label>
            <input type="tel" name="invoice_no" placeholder="請輸入 12 碼純數字" pattern="\d{12}" maxlength="12" required>
            <div class="note">編碼：店別 4 碼 + 年度 2 碼 + 流水碼 6 碼</div>
        </div>

        <div class="form-group">
            <label class="required">智慧眼鏡類型</label>
            <select name="device_type" required>
                <option value="">請選擇眼鏡品牌...</option>
                <option value="Meta Ray-Ban">Meta Ray-Ban</option>
                <option value="ASUS AirVision M1">ASUS AirVision M1</option>
                <option value="HTC VIVE Eagle">HTC VIVE Eagle</option>
                <option value="Rokid Glasses / Max">Rokid Glasses / Max</option>
                <option value="JINS × MEME">JINS × MEME</option>
                <option value="SOLOS 智慧眼鏡">SOLOS 智慧眼鏡</option>
                <option value="其他品牌">其他品牌 (請在下方補充說明備註)</option>
            </select>
        </div>

        <div class="form-group">
            <label class="required">客戶處方類別</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="rx_type" value="近視單焦" required> 近視單焦</label>
                <label class="radio-label"><input type="radio" name="rx_type" value="老花單焦"> 老花單焦</label>
                <label class="radio-label"><input type="radio" name="rx_type" value="老花多焦"> 老花多焦</label>
                <label class="radio-label"><input type="radio" name="rx_type" value="平光"> 平光</label>
                <label class="radio-label"><input type="radio" name="rx_type" value="視控鏡片"> 視控鏡片</label>
            </div>
        </div>

        <div class="form-group">
            <label>補充說明</label>
            <textarea name="memo" rows="3" placeholder="若有特殊客製規格或品牌備註，請在此輸入..."></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">提交紀錄</button>
    </form>
</div>

<script>
    const form = document.getElementById('surveyForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerText = '處理中...';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // ⚠️ 請記得在此處更換為您開好的 Google Apps Script 實體網址
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbzmKUvcAfvesNHHthe8iiw-Co28v43ufyafDEo_1JR04I6-VcZaIUyJ0EKxfdYGkhbo1A/exec'; 

        fetch(scriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('紀錄提交成功！');
            form.reset();
        })
        .catch(error => {
            alert('提交失敗，請檢查網路連線或聯繫總部。');
            console.error('Error:', error);
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = '提交紀錄';
        });
    });
</script>

</body>
</html>
