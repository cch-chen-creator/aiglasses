<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧眼鏡驗配調查</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            
            /* 處方類別語意專用色 */
            --color-myopia: #1e40af;     
            --color-presbyopia: #c2410c; 
            --color-progressive: #15803d;
            --color-plano: #475569;      
            --color-control: #0369a1;    
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 30px 15px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            margin: 0;
            gap: 24px;
        }
        
        .container, .history-container { 
            background: var(--card-bg); 
            padding: 35px 30px; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 500px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); 
            box-sizing: border-box;
        }
        
        h2 { font-size: 24px; font-weight: 700; margin: 0 0 6px 0; text-align: center; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 15px; }
        .required::after { content: " *"; color: #ef4444; }
        
        select, input[type="tel"], textarea { 
            width: 100%; padding: 14px; border: 1.5px solid var(--border-color); border-radius: 10px; font-size: 16px; box-sizing: border-box; background-color: #fff; transition: all 0.2s ease; color: var(--text-main);
        }
        select:focus, input:focus, textarea:focus { border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15); outline: none; }
        
        .radio-group { display: flex; flex-direction: column; gap: 10px; }
        .radio-label { display: flex; align-items: center; padding: 14px; border: 1.5px solid var(--border-color); border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.2s ease; background-color: #fff; }
        .radio-label input { margin-right: 14px; transform: scale(1.2); }

        .rx-myopia { color: var(--color-myopia); } .rx-myopia input { accent-color: var(--color-myopia); }
        .rx-myopia:has(input:checked) { border-color: var(--color-myopia); background-color: #eff6ff; box-shadow: 0 0 0 1px var(--color-myopia); }
        .rx-presbyopia { color: var(--color-presbyopia); } .rx-presbyopia input { accent-color: var(--color-presbyopia); }
        .rx-presbyopia:has(input:checked) { border-color: var(--color-presbyopia); background-color: #fff7ed; box-shadow: 0 0 0 1px var(--color-presbyopia); }
        .rx-progressive { color: var(--color-progressive); } .rx-progressive input { accent-color: var(--color-progressive); }
        .rx-progressive:has(input:checked) { border-color: var(--color-progressive); background-color: #f0fdf4; box-shadow: 0 0 0 1px var(--color-progressive); }
        .rx-plano { color: var(--color-plano); } .rx-plano input { accent-color: var(--color-plano); }
        .rx-plano:has(input:checked) { border-color: var(--color-plano); background-color: #f8fafc; box-shadow: 0 0 0 1px var(--color-plano); }
        .rx-control { color: var(--color-control); } .rx-control input { accent-color: var(--color-control); }
        .rx-control:has(input:checked) { border-color: var(--color-control); background-color: #f0f9ff; box-shadow: 0 0 0 1px var(--color-control); }
        
        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); transition: all 0.2s ease; }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .btn-submit:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        .note { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

        h3 { font-size: 16px; font-weight: 700; margin: 0 0 16px 0; color: var(--text-main); display: flex; justify-content: space-between; }
        .history-list { display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; }
        .history-item { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background-color: #f8fafc; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .item-details div { margin-bottom: 2px; }
        .item-details .inv { font-weight: 700; color: var(--text-main); }
        .item-details .meta { color: var(--text-muted); font-size: 12px; }
        .btn-edit { padding: 6px 12px; background-color: #fff; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; color: #dc2626; transition: all 0.2s; }
        .btn-edit:hover { background-color: #fef2f2; border-color: #fca5a5; }
        .no-data { text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>智慧眼鏡驗配調查</h2>
    <div class="subtitle">2026年度記錄</div>
    
    <form id="surveyForm">
        <div class="form-group">
            <label class="required">填表門市</label>
            <select name="store" id="storeSelect" required>
                <option value="">請選擇門市...</option>
                <option value="0002_北市站前">0002_北市站前</option>
                <option value="0008_北市新南">0008_北市新南</option>
                <option value="0009_北市忠孝">0009_北市忠孝</option>
                <option value="0011_新莊新泰">0011_新莊新泰</option>
                <option value="0012_三峽復興">0012_三峽復興</option>
                <option value="0013_三重重新">0013_三重重新</option>
                <option value="0014_桃園中正">0014_桃園中正</option>
                <option value="0016_台南民生">0016_台南民生</option>
                <option value="0017_板橋忠孝">0017_板橋忠孝</option>
                <option value="0018_高雄鳳山">0018_高雄鳳山</option>
                <option value="0019_永和永和">0019_永和永和</option>
                <option value="0020_新竹文化">0020_新竹文化</option>
                <option value="0021_桃園中壢">0021_桃園中壢</option>
                <option value="0032_台中大墩">0032_台中大墩</option>
                <option value="0047_北市內湖">0047_北市內湖</option>
                <option value="0054_北市常德">0054_北市常德</option>
                <option value="0083_花蓮中山">0083_花蓮中山</option>
                <option value="0087_三重信林">0087_三重信林</option>
                <option value="0088_南崁中正">0088_南崁中正</option>
                <option value="0089_桃園龍潭">0089_桃園龍潭</option>
                <option value="0090_板橋文化">0090_板橋文化</option>
                <option value="0091_北市士林">0091_北市士林</option>
                <option value="0092_中和南勢角">0092_中和南勢角</option>
                <option value="0094_台中豐原">0094_台中豐原</option>
                <option value="0095_台中東勢">0095_台中東勢</option>
                <option value="0097_屏東潮州">0097_屏東潮州</option>
                <option value="0098_嘉義垂楊">0098_嘉義垂楊</option>
                <option value="0099_高雄左營">0099_高雄左營</option>
                <option value="0118_澎湖澎一">0118_澎湖澎一</option>
                <option value="0201_台南長榮">0201_台南長榮</option>
                <option value="0202_台中西屯">0202_台中西屯</option>
                <option value="0203_台中崇德">0203_台中崇德</option>
                <option value="0204_桃園藝文">0204_桃園藝文</option>
                <option value="0205_新竹竹北">0205_新竹竹北</option>
                <option value="0206_雲林斗六">0206_雲林斗六</option>
                <option value="0207_基隆義一">0207_基隆義一</option>
            </select>
        </div>

        <div class="form-group">
            <label class="required">三聯單號</label>
            <input type="tel" name="invoice_no" id="invoiceInput" placeholder="請輸入 12 碼純數字" pattern="\d{12}" maxlength="12" required>
            <div class="note">編碼：店別 4 碼 + 年度 2 碼 + 流水碼 6 碼</div>
        </div>

        <div class="form-group">
            <label class="required">智慧眼鏡類型</label>
            <select name="device_type" id="deviceSelect" required>
                <option value="">請選擇眼鏡品牌...</option>
                <option value="Meta Ray-Ban">Meta Ray-Ban</option>
                <option value="ASUS AirVision M1">ASUS AirVision M1</option>
                <option value="HTC VIVE Eagle">HTC VIVE Eagle</option>
                <option value="Rokid Glasses / Max">Rokid Glasses / Max</option>
                <option value="JINS × MEME">JINS × MEME</option>
                <option value="SOLOS 智慧眼鏡">SOLOS 智慧眼鏡</option>
                <option value="其他品牌">其他品牌 (請在下方補充說明備註)</option>
            </select>
        </div>

        <div class="form-group">
            <label class="required">客戶處方類別</label>
            <div class="radio-group">
                <label class="radio-label rx-myopia"><input type="radio" name="rx_type" value="近視單焦" required> 近視單焦</label>
                <label class="radio-label rx-presbyopia"><input type="radio" name="rx_type" value="老花單焦"> 老花單焦</label>
                <label class="radio-label rx-progressive"><input type="radio" name="rx_type" value="老花多焦"> 老花多焦</label>
                <label class="radio-label rx-plano"><input type="radio" name="rx_type" value="平光"> 平光</label>
                <label class="radio-label rx-control"><input type="radio" name="rx_type" value="視控鏡片"> 視控鏡片</label>
            </div>
        </div>

        <div class="form-group">
            <label>補充說明</label>
            <textarea name="memo" id="memoTextarea" rows="3" placeholder="若有特殊客製規格或品牌備註，請在此輸入..."></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">提交紀錄</button>
    </form>
</div>

<div class="history-container">
    <h3><span>📋 本機今日填報歷史</span> <span style="font-size:12px; color:var(--text-muted); font-weight:normal;">(僅顯示此裝置紀錄)</span></h3>
    <div class="history-list" id="historyList"></div>
</div>

<script>
    const form = document.getElementById('surveyForm');
    const submitBtn = document.getElementById('submitBtn');
    const historyList = document.getElementById('historyList');

    // ⚠️ 請記得在此處更換為您的 Google Apps Script 實體部署網址
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbzmKUvcAfvesNHHthe8iiw-Co28v43ufyafDEo_1JR04I6-VcZaIUyJ0EKxfdYGkhbo1A/exec'; 

    document.addEventListener('DOMContentLoaded', renderHistory);

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerText = '處理中...';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        fetch(scriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('紀錄提交成功！');
            saveToLocal(data); 
            form.reset();
            renderHistory();   
        })
        .catch(error => {
            alert('提交失敗，請檢查網路連線或聯繫總部。');
            console.error('Error:', error);
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = '提交紀錄';
        });
    });

    function saveToLocal(item) {
        let history = JSON.parse(localStorage.getItem('survey_history')) || [];
        history = history.filter(h => h.invoice_no !== item.invoice_no);
        history.unshift(item); 
        if(history.length > 50) history.pop();
        localStorage.setItem('survey_history', JSON.stringify(history));
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('survey_history')) || [];
        if (history.length === 0) {
            historyList.innerHTML = '<div class="no-data">目前暫無填報紀錄</div>';
            return;
        }

        historyList.innerHTML = history.map(item => `
            <div class="history-item">
                <div class="item-details">
                    <div class="inv">單號：${item.invoice_no}</div>
                    <div style="font-weight:500;">${item.store} | ${item.device_type}</div>
                    <div class="meta">處方：<span style="font-weight:700;">${item.rx_type}</span></div>
                </div>
                <button type="button" class="btn-edit" onclick="editRecord('${item.invoice_no}')">✏️ 修改</button>
            </div>
        `).join('');
    }

    window.editRecord = function(invoiceNo) {
        const history = JSON.parse(localStorage.getItem('survey_history')) || [];
        const record = history.find(h => h.invoice_no === invoiceNo);
        
        if(record) {
            document.getElementById('storeSelect').value = record.store;
            document.getElementById('invoiceInput').value = record.invoice_no;
            document.getElementById('deviceSelect').value = record.device_type;
            document.getElementById('memoTextarea').value = record.memo;
            
            const radio = form.querySelector(`input[name="rx_type"][value="${record.rx_type}"]`);
            if(radio) radio.checked = true;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            alert('已將單號 ' + invoiceNo + ' 的數據抽回上方表單，請修正後重新點擊「提交紀錄」即可。');
        }
    }
</script>

</body>
</html>
